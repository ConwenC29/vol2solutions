<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vol.2 Solutions</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body, html {
      height: 100%;
      overflow: hidden;
    }

    /* Video Background */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: contain;
      background-color: black; 
      z-index: -2;
    }

    /* Dark overlay for readability */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: -1;
    }

    /* Center content */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    .hero h1 {
      font-size: 3rem;
      letter-spacing: 2px;
    }

    .hero p {
      margin-top: 15px;
      font-size: 1.2rem;
      max-width: 600px;
      line-height: 1.5;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 25px;
      background: #00bcd4;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      border-radius: 5px;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #0097a7;
    }
  </style>
</head>

<body>

  <!-- VIDEO BACKGROUND -->
  <video autoplay muted loop class="video-bg">
    <source src="images/7945783-uhd_1440_2732_30fps.mp4" type="video/mp4" />
    Your browser does not support the video tag.
  </video>

  <!-- DARK OVERLAY -->
  <div class="overlay"></div>

  <!-- HERO CONTENT -->
  <div class="hero">
    <h1>Vol.2 Solutions</h1>
    <p>
      Reliable Business Process Outsourcing solutions for web development,
      software testing, and scalable digital services.
    </p>
    <button class="btn">Get Started</button>
  </div>

</body>
</html>
