<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vol.2 Solutions</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: url('images/white-cubes-3d-background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #333;
    }

    /* ================= NAVBAR ================= */
    header {
      position: relative;
      background: white; /* or transparent if you prefer */
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      /*position: absolute;*/
      width: 100%;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .logo img {
      height: 50px;
    }

    nav a {
      margin-left: 30px;
      text-decoration: none;
      color: #000;
      font-weight: 500;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00bcd4;
    }

    /* ================= HERO ================= */
    .hero {
      height: 60vh;
      background: url('images/banner-back.jpg') no-repeat center center;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      text-align: center;
      padding: 20px;
    }

    /* Overlay for readability */
    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      color: white;
      max-width: 800px;
    }

    .hero h1 {
      font-size: 3rem;
      line-height: 1.3;
    }

    .hero p {
      margin-top: 20px;
      font-size: 1.2rem;
      line-height: 1.6;
      color: #ddd;
    }

    .hero button {
      margin-top: 30px;
      padding: 14px 30px;
      border: none;
      background: #00bcd4;
      color: white;
      font-size: 1rem;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    .hero button:hover {
      background: #0097a7;
    }

    /* Responsive */
    @media (max-width: 768px) {
      header {
        padding: 20px;
      }

      nav a {
        margin-left: 15px;
      }

      .hero h1 {
        font-size: 2rem;
      }
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <div class="logo">
      <img src="images/Logo_light.png" alt="Vol.2 Solutions Logo">
    </div>

    <nav>
      <a href="#">About Us</a>
      <a href="#">Services</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-content">
      <h1>
        Building Scalable, Reliable Digital Solutions That Drive Business Growth
      </h1>

      <p>
        At Vol.2 Solutions, we design and develop high-quality websites and web applications 
        tailored to your business needs — helping you grow, automate, and stand out in a digital world.
      </p>

      <button>Get Started</button>
    </div>
  </section>

</body>
</html>
